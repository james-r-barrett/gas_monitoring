site_name: Lab Gas Monitor
site_description: Open-source networked CO₂/O₂ monitoring for laboratory growth chambers
site_author: James Barrett
site_url: https://james-r-barrett.github.io/gas_monitoring/

repo_name: james-r-barrett/gas_monitoring
repo_url: https://github.com/james-r-barrett/gas_monitoring

docs_dir: mkdocs-src

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

nav:
  - Home: index.md
  - Hardware:
    - Overview: hardware/README.md
    - Bill of Materials: hardware/bom/README.md
    - Schematics: hardware/schematics/README.md
    - 3D Printing: hardware/3d-print/README.md
  - Firmware:
    - Setup & Flashing: firmware/README.md
    - CO₂ Monitor: firmware/co2_monitor/README.md
    - CO₂ + O₂ Monitor: firmware/co2_o2_monitor/README.md
  - Raspberry Pi Server: server.md
  - Laptop Bridge: laptop-bridge
  - Guides:
    - User Guide: guides/user-guide.md
    - Assembly: guides/assembly.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
